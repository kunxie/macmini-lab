name: GitOps checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: gitops-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  KUBECONFORM_VERSION: v0.8.0
  KUBECONFORM_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
  # Validation dependency only; application promotions do not change this revision.
  KUBERNETES_SCHEMA_REVISION: 5a65d88146aaabf1648f5a21fca28b6abf196f83
  KUBECTL_VERSION: v1.36.2
  KUBECTL_SHA256: 1e9045ec32bea85da43de85f0065358529ea7c7a152eca78154fba5b58c27d82
  HELM_VERSION: v3.19.4
  HELM_SHA256: 759c656fbd9c11e6a47784ecbeac6ad1eb16a9e76d202e51163ab78504848862

jobs:
  registered-applications:
    # Preserve this check name because branch protection may require it.
    name: collector manifests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the proposed GitOps state
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install the pinned Kubernetes client
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          echo "${KUBECTL_SHA256}  ${RUNNER_TEMP}/kubectl" | sha256sum --check
          install -m 0755 "${RUNNER_TEMP}/kubectl" "${RUNNER_TEMP}/bin/kubectl"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Install the pinned Kubernetes schema validator
        run: |
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/kubeconform.tar.gz" \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  ${RUNNER_TEMP}/kubeconform.tar.gz" | sha256sum --check
          tar --extract --gzip --file "${RUNNER_TEMP}/kubeconform.tar.gz" \
            --directory "${RUNNER_TEMP}/bin" kubeconform

      - name: Install the pinned Helm client
        run: |
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/helm.tar.gz" \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          echo "${HELM_SHA256}  ${RUNNER_TEMP}/helm.tar.gz" | sha256sum --check
          tar --extract --gzip --file "${RUNNER_TEMP}/helm.tar.gz" \
            --directory "${RUNNER_TEMP}" linux-amd64/helm
          install -m 0755 "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/bin/helm"

      - name: Install ARM64 emulation for image contract verification
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Check repository scripts
        run: make check

      - name: Test the application registry contract
        run: make registry-test

      - name: Validate the platform and registered applications
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          CHECK_IMAGE_PLATFORM: "true"
        run: make gitops-check
