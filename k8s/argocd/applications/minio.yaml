apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: infrastructure
  sources:
    - repoURL: https://github.com/kunxie/macmini-lab.git
      targetRevision: main
      path: k8s/vendor/minio/tenant
      helm:
        releaseName: minio
        valueFiles:
          - $values/k8s/infra/minio/tenant.values.yaml
    - repoURL: https://github.com/kunxie/macmini-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
