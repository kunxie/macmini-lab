apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-access
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/kunxie/macmini-lab.git
    targetRevision: main
    path: k8s/infra/tailscale
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
