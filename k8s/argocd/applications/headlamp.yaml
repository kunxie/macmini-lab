apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: infrastructure
  sources:
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      chart: headlamp
      targetRevision: 0.43.0
      helm:
        releaseName: headlamp
        valueFiles:
          - $values/k8s/infra/headlamp/values.yaml
    - repoURL: https://github.com/kunxie/macmini-lab.git
      targetRevision: main
      path: k8s/infra/headlamp/resources
    - repoURL: https://github.com/kunxie/macmini-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  revisionHistoryLimit: 10
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
