apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: job-info-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: job-info-collector
  source:
    repoURL: https://github.com/kunxie/macmini-lab.git
    targetRevision: main
    path: k8s/apps/job-info-collector
  destination:
    server: https://kubernetes.default.svc
    namespace: job-info-collector
  revisionHistoryLimit: 10
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
