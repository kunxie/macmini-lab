apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: personal-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  description: Namespaced applications registered with the personal platform
  sourceRepos:
    - https://github.com/kunxie/*.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceBlacklist:
    - group: "*"
      kind: "*"
  namespaceResourceBlacklist:
    - group: ""
      kind: Secret
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
  orphanedResources:
    warn: true
