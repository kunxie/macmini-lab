apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgadmin
    spec:
      securityContext:
        fsGroup: 5050
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: pgadmin
          image: docker.io/dpage/pgadmin4:9.16
          imagePullPolicy: IfNotPresent
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: pgadmin-admin-credentials
                  key: email
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgadmin-admin-credentials
                  key: password
            - name: PGADMIN_LISTEN_PORT
              value: "8080"
            - name: PGADMIN_SERVER_JSON_FILE
              value: /etc/pgadmin/servers.json
            - name: PGADMIN_REPLACE_SERVERS_ON_STARTUP
              value: "True"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 5050
            runAsGroup: 5050
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            httpGet:
              path: /misc/ping
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
            - name: servers
              mountPath: /etc/pgadmin/servers.json
              subPath: servers.json
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pgadmin
        - name: servers
          configMap:
            name: pgadmin-servers
