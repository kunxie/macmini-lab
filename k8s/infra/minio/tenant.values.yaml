tenant:
  name: minio

  configSecret:
    name: minio-root-credentials
    existingSecret: true

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      size: 20Gi
      storageClassName: local-path
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi

  certificate:
    requestAutoCert: false

  buckets:
    - name: job-info-collector
    - name: postgres-backups

  users:
    - name: job-info-collector-minio-credentials

  metrics:
    enabled: true

  exposeServices:
    minio: false
    console: false
