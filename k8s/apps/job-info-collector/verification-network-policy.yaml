apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: job-info-collector-release-verification-egress
  labels:
    app.kubernetes.io/component: release-verification
    app.kubernetes.io/name: job-info-collector
    app.kubernetes.io/part-of: job-info-collector
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: release-verification
      app.kubernetes.io/name: job-info-collector
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data
          podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data
          podSelector:
            matchLabels:
              v1.min.io/tenant: minio
      ports:
        - protocol: TCP
          port: 9000
