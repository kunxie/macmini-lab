apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: job-info-collector
resources:
  - detail-worker.yaml
  - migration.yaml
  - migration-release.yaml
  - network-policy.yaml
  - release.yaml
  - verification-network-policy.yaml
replacements:
  - source:
      kind: ConfigMap
      name: job-info-collector-release
      fieldPath: data.imageReference
    targets:
      - select:
          kind: Deployment
          name: job-info-collector-detail-worker
        fieldPaths:
          - spec.template.spec.containers.[name=detail-worker].image
  - source:
      kind: ConfigMap
      name: job-info-collector-release
      fieldPath: data.applicationVersion
    targets:
      - select:
          kind: Deployment
          name: job-info-collector-detail-worker
        fieldPaths:
          - metadata.labels.[app.kubernetes.io/version]
          - spec.template.metadata.labels.[app.kubernetes.io/version]
  - source:
      kind: ConfigMap
      name: job-info-collector-release
      fieldPath: data.sourceRevision
    targets:
      - select:
          kind: Deployment
          name: job-info-collector-detail-worker
        fieldPaths:
          - metadata.annotations.[job-info-collector.kunxie.dev/source-revision]
          - spec.template.metadata.annotations.[job-info-collector.kunxie.dev/source-revision]
  - source:
      kind: ConfigMap
      name: job-info-collector-release
      fieldPath: data.imageDigest
    targets:
      - select:
          kind: Deployment
          name: job-info-collector-detail-worker
        fieldPaths:
          - metadata.annotations.[job-info-collector.kunxie.dev/image-digest]
          - spec.template.metadata.annotations.[job-info-collector.kunxie.dev/image-digest]
  - source:
      kind: ConfigMap
      name: job-info-collector-migration-release
      fieldPath: data.imageReference
    targets:
      - select:
          kind: Job
          name: job-info-collector-database-migration
        fieldPaths:
          - spec.template.spec.containers.[name=database-migration].image
  - source:
      kind: ConfigMap
      name: job-info-collector-migration-release
      fieldPath: data.applicationVersion
    targets:
      - select:
          kind: Job
          name: job-info-collector-database-migration
        fieldPaths:
          - metadata.labels.[app.kubernetes.io/version]
          - spec.template.metadata.labels.[app.kubernetes.io/version]
  - source:
      kind: ConfigMap
      name: job-info-collector-migration-release
      fieldPath: data.sourceRevision
    targets:
      - select:
          kind: Job
          name: job-info-collector-database-migration
        fieldPaths:
          - metadata.annotations.[job-info-collector.kunxie.dev/source-revision]
          - spec.template.metadata.annotations.[job-info-collector.kunxie.dev/source-revision]
  - source:
      kind: ConfigMap
      name: job-info-collector-migration-release
      fieldPath: data.imageDigest
    targets:
      - select:
          kind: Job
          name: job-info-collector-database-migration
        fieldPaths:
          - metadata.annotations.[job-info-collector.kunxie.dev/image-digest]
          - spec.template.metadata.annotations.[job-info-collector.kunxie.dev/image-digest]
  - source:
      kind: ConfigMap
      name: job-info-collector-migration-release
      fieldPath: data.alembicHead
    targets:
      - select:
          kind: Job
          name: job-info-collector-database-migration
        fieldPaths:
          - metadata.annotations.[job-info-collector.kunxie.dev/alembic-head]
          - spec.template.metadata.annotations.[job-info-collector.kunxie.dev/alembic-head]
  - source:
      kind: ConfigMap
      name: job-info-collector-migration-release
      fieldPath: data.migrationGeneration
    targets:
      - select:
          kind: Job
          name: job-info-collector-database-migration
        fieldPaths:
          - metadata.annotations.[job-info-collector.kunxie.dev/migration-generation]
          - spec.template.metadata.annotations.[job-info-collector.kunxie.dev/migration-generation]
