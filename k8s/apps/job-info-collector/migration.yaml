apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: job-info-collector-database-migration-egress
  labels:
    app.kubernetes.io/component: database-migration
    app.kubernetes.io/name: job-info-collector
    app.kubernetes.io/part-of: job-info-collector
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: database-migration
      app.kubernetes.io/name: job-info-collector
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data
          podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-info-collector-database-migration
  labels:
    app.kubernetes.io/component: database-migration
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: job-info-collector
    app.kubernetes.io/part-of: job-info-collector
    app.kubernetes.io/version: replaced-by-kustomize
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
    job-info-collector.kunxie.dev/source-revision: replaced-by-kustomize
    job-info-collector.kunxie.dev/image-digest: replaced-by-kustomize
    job-info-collector.kunxie.dev/alembic-head: replaced-by-kustomize
    job-info-collector.kunxie.dev/migration-generation: replaced-by-kustomize
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: database-migration
        app.kubernetes.io/name: job-info-collector
        app.kubernetes.io/part-of: job-info-collector
        app.kubernetes.io/version: replaced-by-kustomize
      annotations:
        job-info-collector.kunxie.dev/source-revision: replaced-by-kustomize
        job-info-collector.kunxie.dev/image-digest: replaced-by-kustomize
        job-info-collector.kunxie.dev/alembic-head: replaced-by-kustomize
        job-info-collector.kunxie.dev/migration-generation: replaced-by-kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      securityContext:
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: database-migration
          image: replaced-by-kustomize
          imagePullPolicy: Always
          args:
            - migrate
          env:
            - name: JIC_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: job-info-collector-db-credentials
                  key: username
            - name: JIC_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: job-info-collector-db-credentials
                  key: password
            - name: JIC_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: job-info-collector-db-credentials
                  key: host
            - name: JIC_DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: job-info-collector-db-credentials
                  key: port
            - name: JIC_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: job-info-collector-db-credentials
                  key: dbname
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
